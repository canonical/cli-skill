name: design
base: ubuntu@24.04
sdks:
  - name: system
    plugs:
      penpot:
        interface: tunnel
        endpoint: 4400
      penpot-http:
        interface: tunnel
        endpoint: 4401
      penpot-websocket:
        interface: tunnel
        endpoint: 4402
      penpot-repl:
        interface: tunnel
        endpoint: 4403
  - name: vscode-remote
    channel: latest/stable
  - name: copilot
    channel: latest/stable
  - name: node
    channel: 22/stable
  - name: project-mcps
actions:
  fetch-skills: |
    if [ -d /home/workshop/.copilot/skills/.git ]; then
      git -C /home/workshop/.copilot/skills pull
    else
      gh auth login
      gh repo clone https://github.com/canonical/design-skills /home/workshop/.copilot/skills
    fi
