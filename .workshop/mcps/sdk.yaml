name: mcps
base: ubuntu@24.04

slots:
  penpot:
    interface: tunnel
    endpoint: 4400
  penpot-http:
    interface: tunnel
    endpoint: 4401
  penpot-websocket:
    interface: tunnel
    endpoint: 4402
  penpot-repl:
    interface: tunnel
    endpoint: 4403

plugs:
  ssh-agent:
    interface: ssh-agent