name: cli-skill-review-reusable

on:
  workflow_call:
    inputs:
      command:
        description: "cli-skill command to run"
        required: false
        type: string
        default: "/cli-review"
      target_path:
        description: "Repository path to analyze"
        required: false
        type: string
        default: "."
      pr_number:
        description: "Pull request number for report comment upsert"
        required: false
        type: number
      provider:
        description: "Pi provider"
        required: true
        type: string
      model:
        description: "Pi model"
        required: false
        type: string
        default: "moonshotai/kimi-k2.6"
      thinking_level:
        description: "Pi thinking level"
        required: false
        type: string
        default: "medium"
      post_pr_comment:
        description: "Whether to publish/update PR markdown report"
        required: false
        type: boolean
        default: true
      fail_on_agent_error:
        description: "Fail workflow when Pi action does not succeed"
        required: false
        type: boolean
        default: true
      cli_paths_include:
        description: "Optional include path filters (comma or newline separated globs)"
        required: false
        type: string
        default: ""
      cli_paths_exclude:
        description: "Optional exclude path filters (comma or newline separated globs)"
        required: false
        type: string
        default: ""
      enforce_cli_metadata:
        description: "Require knowledge_base/CLI.md metadata when no include filters are provided"
        required: false
        type: boolean
        default: false
      skill_source_ref:
        description: "Git ref (branch, tag, or SHA) used to fetch cli-skill assets"
        required: false
        type: string
        default: "main"
    secrets:
      llm_token:
        description: "LLM provider token used by Pi"
        required: true
      gh_token:
        description: "GitHub token for PR APIs"
        required: true
      skill_source_token:
        description: "Optional token used to checkout canonical/cli-skill when cross-repo access is restricted"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  cli-review:
    runs-on: ubuntu-latest
    concurrency:
      group: cli-skill-review-${{ github.repository }}-${{ inputs.pr_number || github.run_id }}-${{ inputs.command }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository under review
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout workflow source repository
        uses: actions/checkout@v5
        with:
          repository: canonical/cli-skill
          ref: ${{ inputs.skill_source_ref }}
          path: .cli-skill-infra
          token: ${{ secrets.skill_source_token != '' && secrets.skill_source_token || secrets.gh_token }}

      - name: Verify internal cli-skill assets
        run: |
          set -euo pipefail
          test -f .cli-skill-infra/scripts/check-cli-scope.py
          test -f .cli-skill-infra/scripts/build-pr-report.py
          test -d .cli-skill-infra/cli-skill

      - name: Check CLI metadata and changed paths
        id: cli_scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CLI_PATHS_INCLUDE: ${{ inputs.cli_paths_include }}
          CLI_PATHS_EXCLUDE: ${{ inputs.cli_paths_exclude }}
          ENFORCE_CLI_METADATA: ${{ inputs.enforce_cli_metadata }}
        run: |
          set -euo pipefail
          python3 .cli-skill-infra/scripts/check-cli-scope.py

      - name: Run Pi agent
        if: ${{ steps.cli_scope.outputs.proceed == 'true' }}
        id: pi
        uses: shaftoe/pi-coding-agent-action@v2
        with:
          github_token: ${{ secrets.gh_token }}
          provider: openai
          base_url: https://openrouter.ai/api/v1
          model: ${{ inputs.model }}
          token: ${{ secrets.llm_token }}
          thinking_level: ${{ inputs.thinking_level }}
          export_session_html: true
          export_session_jsonl: true
          prompt: |
            Run ${{ inputs.command }} from the cli-skill in this repository.

            Scope rules:
            - If command is /cli-review, perform only CLI standard compliance checks.
            - Use .cli-skill-infra/cli-skill/references/cli-standard.md as the sole review standard.

            Repository target path: ${{ inputs.target_path }}

            Output requirements:
            - Return markdown only.
            - Keep findings evidence-based and standards-mapped.
            - Include a short summary table with severity counts and overall score.

      - name: Upload Pi session artifacts
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && (steps.pi.outputs.session_html_path || steps.pi.outputs.session_jsonl_path) }}
        uses: actions/upload-artifact@v4
        with:
          name: pi-session-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ steps.pi.outputs.session_html_path }}
            ${{ steps.pi.outputs.session_jsonl_path }}

      - name: Build PR report body
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && inputs.post_pr_comment && inputs.pr_number > 0 }}
        id: report
        env:
          PI_RESPONSE: ${{ steps.pi.outputs.response }}
          PI_SUCCESS: ${{ steps.pi.outputs.success }}
          PI_COST: ${{ steps.pi.outputs.cost }}
          PI_DURATION: ${{ steps.pi.outputs.duration_seconds }}
          PI_INPUT_TOKENS: ${{ steps.pi.outputs.input_tokens }}
          PI_OUTPUT_TOKENS: ${{ steps.pi.outputs.output_tokens }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MARKER: "<!-- cli-skill-report:${{ inputs.command }} -->"
          COMMAND: ${{ inputs.command }}
        run: |
          set -euo pipefail
          python3 .cli-skill-infra/scripts/build-pr-report.py

      - name: Fail when agent run is unsuccessful
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && inputs.fail_on_agent_error && steps.pi.outputs.success != 'true' }}
        run: |
          echo "Pi agent reported success=${{ steps.pi.outputs.success }}"
          exit 1
