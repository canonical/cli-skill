name: cli-skill-review-reusable

on:
  workflow_call:
    inputs:
      command:
        description: "cli-skill command to run"
        required: false
        type: string
        default: "/cli-review"
      target_path:
        description: "Repository path to analyze"
        required: false
        type: string
        default: "."
      pr_number:
        description: "Pull request number for report comment upsert"
        required: false
        type: number
      provider:
        description: "Pi provider"
        required: false
        type: string
        default: "openrouter"
      model:
        description: "Pi model"
        required: false
        type: string
        default: "openrouter/fusion"
      fusion_analysis_models:
        description: "OpenRouter Fusion analysis models (comma-separated)"
        required: false
        type: string
        default: "~moonshotai/kimi-k2.7-code,~deepseek/deepseek-v3.2,~google/gemini-flash-latest"
      fusion_synthesis_model:
        description: "OpenRouter Fusion synthesis model"
        required: false
        type: string
        default: "~moonshotai/kimi-k2.7-code"
      thinking_level:
        description: "Pi thinking level"
        required: false
        type: string
        default: "medium"
      post_pr_comment:
        description: "Whether to publish/update PR markdown report"
        required: false
        type: boolean
        default: true
      fail_on_agent_error:
        description: "Fail workflow when Pi action does not succeed"
        required: false
        type: boolean
        default: true
      cli_paths_include:
        description: "Optional include path filters (comma or newline separated globs)"
        required: false
        type: string
        default: ""
      cli_paths_exclude:
        description: "Optional exclude path filters (comma or newline separated globs)"
        required: false
        type: string
        default: ""
      enforce_cli_metadata:
        description: "Require knowledge_base/CLI.md metadata when no include filters are provided"
        required: false
        type: boolean
        default: false
      skill_source_ref:
        description: "Git ref (branch, tag, or SHA) used to fetch cli-skill assets"
        required: false
        type: string
        default: "main"
    secrets:
      llm_token:
        description: "LLM provider token used by Pi"
        required: true
      gh_token:
        description: "GitHub token for PR APIs"
        required: true
      skill_source_token:
        description: "Optional token used to checkout canonical/cli-skill when cross-repo access is restricted"
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  cli-review:
    runs-on: ubuntu-latest
    concurrency:
      group: cli-skill-review-${{ github.repository }}-${{ inputs.pr_number || github.run_id }}-${{ inputs.command }}
      cancel-in-progress: true

    steps:
      - name: Install Node.js 24 via nvm
        run: |
          set -euo pipefail
          export NVM_DIR="$HOME/.nvm"
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          . "$NVM_DIR/nvm.sh"
          nvm install 24
          nvm use 24
          NODE_BIN_DIR="$(dirname "$(nvm which 24)")"
          echo "$NODE_BIN_DIR" >> "$GITHUB_PATH"
          echo "NVM_DIR=$NVM_DIR" >> "$GITHUB_ENV"
          node -v
          npm -v

      - name: Checkout repository under review
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout workflow source repository
        uses: actions/checkout@v5
        with:
          repository: canonical/cli-skill
          ref: ${{ inputs.skill_source_ref }}
          path: .cli-skill-infra
          token: ${{ secrets.skill_source_token != '' && secrets.skill_source_token || secrets.gh_token }}

      - name: Verify internal cli-skill assets
        run: |
          set -euo pipefail
          test -f .cli-skill-infra/scripts/check-cli-scope.py
          test -f .cli-skill-infra/scripts/build-pr-report.py
          test -d .cli-skill-infra/cli-skill

      - name: Check CLI metadata and changed paths
        id: cli_scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CLI_PATHS_INCLUDE: ${{ inputs.cli_paths_include }}
          CLI_PATHS_EXCLUDE: ${{ inputs.cli_paths_exclude }}
          ENFORCE_CLI_METADATA: ${{ inputs.enforce_cli_metadata }}
        run: |
          set -euo pipefail
          python3 .cli-skill-infra/scripts/check-cli-scope.py

      - name: Install cli-skill for Pi discovery
        if: ${{ steps.cli_scope.outputs.proceed == 'true' }}
        run: |
          mkdir -p ~/.pi/skills
          cp -R .cli-skill-infra/cli-skill ~/.pi/skills/

      - name: Create Pi configuration and run agent
        if: ${{ steps.cli_scope.outputs.proceed == 'true' }}
        id: pi
        env:
          LLM_TOKEN: ${{ secrets.llm_token }}
          GH_TOKEN: ${{ secrets.gh_token }}
          PI_PROVIDER: ${{ inputs.provider }}
          PI_MODEL: ${{ inputs.model }}
          PI_THINKING_LEVEL: ${{ inputs.thinking_level }}
          PI_COMMAND: ${{ inputs.command }}
          PI_TARGET_PATH: ${{ inputs.target_path }}
          FUSION_ANALYSIS_MODELS: ${{ inputs.fusion_analysis_models }}
          FUSION_SYNTHESIS_MODEL: ${{ inputs.fusion_synthesis_model }}
        run: |
          set -euo pipefail
          
          npm install -g --ignore-scripts @earendil-works/pi-coding-agent

          echo ${PI_MODEL}

          # Write the OpenRouter Fusion extension that injects plugins into the request payload
          mkdir -p ~/.pi/agent/extensions
          cat > ~/.pi/agent/extensions/openrouter-fusion.ts <<'EXT_EOF'
          import type { ExtensionAPI } from "@earendil-works/pi-coding-agent";

          const ANALYSIS_MODELS = (process.env.FUSION_ANALYSIS_MODELS || "")
            .split(",")
            .map((m) => m.trim())
            .filter((m) => m.length > 0);

          const SYNTHESIS_MODEL = process.env.FUSION_SYNTHESIS_MODEL || "";

          export default function (pi: ExtensionAPI) {
            pi.on("before_provider_request", (event) => {
              const payload = event.payload;
              if (payload.model !== "openrouter/fusion") return;

              return {
                ...payload,
                plugins: [
                  {
                    id: "fusion",
                    analysis_models: ANALYSIS_MODELS,
                    model: SYNTHESIS_MODEL,
                  },
                ],
              };
            });
          }
          EXT_EOF

          # Run Pi agent with explicit provider/model and the fusion extension
          pi -p \
            --provider "${PI_PROVIDER}" \
            --model "${PI_MODEL}" \
            --thinking "${PI_THINKING_LEVEL}" \
            --api-key "${LLM_TOKEN}" \
            --extension ~/.pi/agent/extensions/openrouter-fusion.ts \
            <<PROMPT_EOF
          Review this pull request. Before starting, use get_issue_or_pr_thread to
          fetch any existing review comments so you don't duplicate feedback that
          has already been given. Focus on issues, bugs, and security concerns.
          Post your findings as a PR review when done.

          Run ${PI_COMMAND} from the cli-skill in this repository.

          Scope rules:
          - If command is /cli-review, perform only CLI standard compliance checks.
          - Use .cli-skill-infra/cli-skill/references/cli-standard.md as the sole review standard.

          Repository target path: ${PI_TARGET_PATH}

          Output requirements:
          - Follow the section structure defined in `.cli-skill-infra/cli-skill/references/cli-review-output-format.md` exactly.
          - The overall score MUST be computed by running `python3 .cli-skill-infra/scripts/calculate_cli_score.py <json_file>` (fallback: `python3 scripts/calculate_cli_score.py <json_file>`) — do not calculate or estimate it manually.
          - Keep findings evidence-based and standards-mapped.
          PROMPT_EOF
          
          # Extract session outputs from Pi result (adjust paths based on actual Pi output)
          SESSION_HTML=$(find ~ -name "*.html" -path "*pi*session*" -type f | head -1 || echo "")
          SESSION_JSONL=$(find ~ -name "*.jsonl" -path "*pi*session*" -type f | head -1 || echo "")
          
          echo "session_html_path=${SESSION_HTML}" >> $GITHUB_OUTPUT
          echo "session_jsonl_path=${SESSION_JSONL}" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Build PR report from Pi output
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && steps.pi.outputs.session_jsonl_path != '' && inputs.post_pr_comment }}
        id: report
        run: |
          set -euo pipefail
          python3 .cli-skill-infra/scripts/build-pr-report.py "${{ steps.pi.outputs.session_jsonl_path }}" > pr_report.md
          echo "report_path=pr_report.md" >> $GITHUB_OUTPUT

      - name: Upsert PR comment
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && steps.report.outputs.report_path != '' && inputs.pr_number != '' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ inputs.pr_number }}
          body-file: ${{ steps.report.outputs.report_path }}
          edit-mode: replace
          body-includes: "<!-- cli-review-report -->"

      - name: Upload Pi session HTML artifact
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && steps.pi.outputs.session_html_path != '' }}
        id: upload_session_html
        uses: actions/upload-artifact@v7
        with:
          name: pi-session-html-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.pi.outputs.session_html_path }}

      - name: Upload Pi session JSONL artifact
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && steps.pi.outputs.session_jsonl_path != '' }}
        id: upload_session_jsonl
        uses: actions/upload-artifact@v7
        with:
          name: pi-session-jsonl-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.pi.outputs.session_jsonl_path }}

      - name: Fail when agent run is unsuccessful
        if: ${{ steps.cli_scope.outputs.proceed == 'true' && inputs.fail_on_agent_error && steps.pi.outputs.success != 'true' }}
        run: |
          echo "Pi agent reported success=${{ steps.pi.outputs.success }}"
          exit 1
